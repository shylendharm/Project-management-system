name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────
  # Backend: Install, generate Prisma, run tests
  # ─────────────────────────────────────────────────
  backend:
    name: Backend – Test & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Run backend unit & integration tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-jwt-secret
          JWT_EXPIRES_IN: 1d
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Validate backend entry point (syntax check)
        working-directory: backend
        run: node --check src/server.js

  # ─────────────────────────────────────────────────
  # Frontend: Install, test, and build
  # ─────────────────────────────────────────────────
  frontend:
    name: Frontend – Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend unit tests (Vitest)
        working-directory: frontend
        run: npm test

      - name: Build frontend (Vite)
        working-directory: frontend
        run: npm run build
